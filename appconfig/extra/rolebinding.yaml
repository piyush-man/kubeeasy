apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.namespace }}-bind
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.namespace }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: {{ .Values.namespace }}-role
  apiGroup: rbac.authorization.k8s.io

