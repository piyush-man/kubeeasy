apiVersion: v1
kind: Service
metadata:
  name: {{ include "clients.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clients.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "clients.selectorLabels" . | nindent 4 }}


