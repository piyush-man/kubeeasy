image:
  repository: docker.io/piyushman/kubemanager
  tag: latest
  pullPolicy: Always

groqApiKey: ""
agentToken: ""

namespace: kubemanager

qdrant:
  # Auto-detected by install.sh — override with STORAGE_CLASS= in .env
  # Examples: microk8s-hostpath, local-path (k3s), gp2 (EKS), standard (GKE)
  storageClassName: ""
  storageSize: 1Gi

pipeline:
  intervalSeconds: 15

api:
  port: 8080
  # NodePort for local/on-prem, LoadBalancer for cloud (auto-set by install.sh)
  serviceType: NodePort

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1.5Gi"
    cpu: "1000m"
