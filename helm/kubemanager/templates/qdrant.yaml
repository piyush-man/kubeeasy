apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.qdrant.storageClassName }}
  storageClassName: {{ .Values.qdrant.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.qdrant.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: qdrant-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubemanager-data-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.qdrant.storageClassName }}
  storageClassName: {{ .Values.qdrant.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: 512Mi
