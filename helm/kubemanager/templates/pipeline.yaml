apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubemanager-pipeline
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubemanager-pipeline
  template:
    metadata:
      labels:
        app: kubemanager-pipeline
    spec:
      serviceAccountName: kubemanager
      containers:
        - name: pipeline
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "rag/rag_pipeline.py", "--purge-on-start"]
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubemanager-secrets
                  key: GROQ_API_KEY
            - name: QDRANT_HOST
              value: qdrant
            - name: QDRANT_PORT
              value: "6333"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
