apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeeasy.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeeasy.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        gzip on;
        gzip_types text/plain text/css application/javascript application/json;
        location / {
            try_files $uri $uri/ /index.html;
        }
        location /ws {
            proxy_pass http://{{ include "kubeeasy.backendService" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.port }}/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
        location /api/ {
            proxy_pass http://{{ include "kubeeasy.backendService" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.port }}/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
        }
    }
