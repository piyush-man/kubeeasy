apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubeeasy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeeasy.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeeasy.fullname" . }}-role
  labels:
    {{- include "kubeeasy.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, events, namespaces, nodes, services, configmaps, secrets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, replicasets, daemonsets, statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [metrics.k8s.io]
    resources: [pods, nodes]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeeasy.fullname" . }}-binding
  labels:
    {{- include "kubeeasy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeeasy.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeeasy.fullname" . }}
    namespace: {{ .Release.Namespace }}
