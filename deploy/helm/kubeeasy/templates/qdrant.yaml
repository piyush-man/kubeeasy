apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kubeeasy.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeeasy.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.qdrant.storageClassName }}
  storageClassName: {{ .Values.qdrant.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.qdrant.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeeasy.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeeasy.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "kubeeasy.labels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "kubeeasy.fullname" . }}-qdrant
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeeasy.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeeasy.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: qdrant
  ports:
    - port: 6333
      targetPort: 6333
